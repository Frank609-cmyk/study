name: Notify Lark

on:
  pull_request:
    types: [opened, closed, reopened]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Lark
        run: |
          curl -X POST "${{ secrets.LARK_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "msg_type": "text",
            "content": {
              "text": "🚀 GitHub有更新：${{ github.repository }} - ${{ github.event_name }} by ${{ github.actor }}"
            }
          }'
