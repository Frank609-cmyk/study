name: Notify Lark

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, closed, reopened, synchronize]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Lark card
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}

          # PR
          EVENT_ACTION: ${{ github.event.action }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_COMMITS: ${{ github.event.pull_request.commits }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}

          # push
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}

        run: |
          python3 << 'PY'
          import os
          import json
          import urllib.request

          webhook = os.environ["LARK_WEBHOOK"]
          event = os.environ.get("EVENT_NAME", "")

          def send(card):
              data = json.dumps({
                  "msg_type": "interactive",
                  "card": card
              }).encode("utf-8")

              req = urllib.request.Request(
                  webhook,
                  data=data,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )

              with urllib.request.urlopen(req) as resp:
                  print(resp.read().decode())

          if event == "pull_request":
              card = {
                  "config": {"wide_screen_mode": True},
                  "header": {
                      "template": "blue",
                      "title": {"tag": "plain_text", "content": "🚀 GitHub PR 通知"}
                  },
                  "elements": [
                      {
                          "tag": "div",
                          "text": {
                              "tag": "lark_md",
                              "content": (
                                  f"**仓库：** {os.environ.get('REPO')}\n"
                                  f"**标题：** {os.environ.get('PR_TITLE')}\n"
                                  f"**动作：** {os.environ.get('EVENT_ACTION')}\n"
                                  f"**作者：** {os.environ.get('ACTOR')}"
                              )
                          }
                      },
                      {"tag": "hr"},
                      {
                          "tag": "div",
                          "text": {
                              "tag": "lark_md",
                              "content": (
                                  f"**分支：** {os.environ.get('PR_HEAD')} → {os.environ.get('PR_BASE')}\n"
                                  f"**是否已 Merge：** {os.environ.get('PR_MERGED')}\n"
                                  f"**Commit 数：** {os.environ.get('PR_COMMITS')}\n"
                                  f"**变更文件数：** {os.environ.get('PR_CHANGED_FILES')}\n"
                                  f"**代码变更：** +{os.environ.get('PR_ADDITIONS')} / -{os.environ.get('PR_DELETIONS')}"
                              )
                          }
                      },
                      {
                          "tag": "action",
                          "actions": [
                              {
                                  "tag": "button",
                                  "text": {"tag": "plain_text", "content": "打开 PR"},
                                  "type": "primary",
                                  "url": os.environ.get("PR_URL")
                              }
                          ]
                      }
                  ]
              }
              send(card)

          elif event == "push":
              card = {
                  "config": {"wide_screen_mode": True},
                  "header": {
                      "template": "green",
                      "title": {"tag": "plain_text", "content": "📦 GitHub Push 通知"}
                  },
                  "elements": [
                      {
                          "tag": "div",
                          "text": {
                              "tag": "lark_md",
                              "content": (
                                  f"**仓库：** {os.environ.get('REPO')}\n"
                                  f"**分支：** {os.environ.get('REF_NAME')}\n"
                                  f"**作者：** {os.environ.get('ACTOR')}\n"
                                  f"**Commit：** {os.environ.get('COMMIT_MSG')}"
                              )
                          }
                      },
                      {
                          "tag": "action",
                          "actions": [
                              {
                                  "tag": "button",
                                  "text": {"tag": "plain_text", "content": "打开 Commit"},
                                  "type": "primary",
                                  "url": os.environ.get("COMMIT_URL")
                              }
                          ]
                      }
                  ]
              }
              send(card)

          else:
              card = {
                  "header": {
                      "template": "purple",
                      "title": {"tag": "plain_text", "content": "🧪 测试成功"}
                  },
                  "elements": [
                      {
                          "tag": "div",
                          "text": {
                              "tag": "lark_md",
                              "content": (
                                  f"**仓库：** {os.environ.get('REPO')}\n"
                                  f"**作者：** {os.environ.get('ACTOR')}\n"
                                  "Lark 通知正常 ✅"
                              )
                          }
                      }
                  ]
              }
              send(card)
          PY
